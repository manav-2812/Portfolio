<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&amp;display=swap');
      .bg {
        fill: #3C4A3F;
      }
      .monogram {
        font-family: 'Fraunces', 'Georgia', serif;
        font-weight: 700;
        fill: #FAF8F4;
        font-size: 26px;
        letter-spacing: -0.03em;
      }
    </style>
  </defs>
  
  <!-- Background Card -->
  <rect width="64" height="64" rx="16" class="bg" />
  
  <!-- Monogram matching the navbar logo precisely -->
  <text x="32" y="32" text-anchor="middle" dominant-baseline="central" class="monogram">MB</text>
</svg>