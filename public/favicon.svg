<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600..700&amp;display=swap');
      .bg {
        fill: #FAF8F4;
      }
      .border {
        fill: none;
        stroke: rgba(25, 23, 20, 0.08);
        stroke-width: 1;
      }
      .text {
        font-family: 'Fraunces', 'Georgia', serif;
        font-weight: 700;
        fill: #3C4A3F;
        font-size: 23px;
        letter-spacing: -0.02em;
      }
      .accent {
        stroke: #191714;
        stroke-width: 2.2;
        stroke-linecap: round;
      }
    </style>
  </defs>
  
  <!-- Background Card -->
  <rect width="64" height="64" rx="14" class="bg" />
  <rect x="0.5" y="0.5" width="63" height="63" rx="13.5" class="border" />
  
  <!-- Monogram -->
  <text x="32" y="32" text-anchor="middle" dominant-baseline="middle" class="text">MB</text>
  
  <!-- Underline -->
  <line x1="20" y1="46" x2="44" y2="46" class="accent" />
</svg>